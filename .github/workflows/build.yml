# Авто-сборка сайта: при изменении src/ пересобирает index.html и en/index.html
# из src/build.py и коммитит их обратно. Ты правишь только src/build.py.
name: Build site

on:
  push:
    branches: [main]
    paths: ["src/**", ".github/workflows/build.yml"]
  workflow_dispatch:        # можно запустить вручную из вкладки Actions

permissions:
  contents: write           # чтобы Action мог запушить пересобранные страницы

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Пересобрать страницы
        run: python3 src/build.py

      - name: Закоммитить, если страницы изменились
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html en/index.html
          if git diff --cached --quiet; then
            echo "Сгенерированные страницы не изменились — коммитить нечего."
          else
            git commit -m "Пересборка страниц из src/build.py [skip ci]"
            git push
          fi
